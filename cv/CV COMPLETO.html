<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Ganadera PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:#fff;padding:20px}
.container{max-width:900px;margin:auto}
.card{background:#0f172a;padding:20px;border-radius:15px;margin-bottom:20px}
h1{text-align:center;color:#22c55e}
select,input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px}
input,select{background:#1e293b;color:#fff}
button{background:#22c55e;color:#000;font-weight:bold;cursor:pointer}
.result{margin-top:15px;color:#22c55e;line-height:1.6}
</style>
</head>
<body>

<div class="container">
<h1>🐄 Calculadora Ganadera PRO</h1>

<div class="card">
<h2>📥 Datos</h2>

<select id="tipo">
<option value="bovino">Bovino</option>
<option value="ovino">Ovino</option>
<option value="caprino">Caprino</option>
<option value="porcino">Porcino</option>
</select>

<input id="peso" type="number" placeholder="Peso promedio (kg)">
<input id="cantidad" type="number" placeholder="Cantidad de animales">

<button onclick="calcular()">🚀 Calcular</button>

<div id="res" class="result"></div>
</div>

</div>

<script>

function calcular(){

let tipo=document.getElementById("tipo").value;
let peso=parseFloat(document.getElementById("peso").value);
let cantidad=parseFloat(document.getElementById("cantidad").value);

if(!peso || !cantidad){
document.getElementById("res").innerHTML="⚠️ Completa los datos";
return;
}

// DATOS TÉCNICOS (% del peso vivo)
let datos={
bovino:{ms:0.025,agua:0.08},
ovino:{ms:0.03,agua:0.10},
caprino:{ms:0.035,agua:0.12},
porcino:{ms:0.04,agua:0.10}
};

let d=datos[tipo];

// CALCULOS
let consumoMS=peso*d.ms; // kg MS/día
let consumoAgua=peso*d.agua; // litros/día

let totalMS=consumoMS*cantidad;
let totalAgua=consumoAgua*cantidad;

// RESULTADOS
document.getElementById("res").innerHTML=`
🐾 Consumo por animal:<br>
🌿 Materia seca: ${consumoMS.toFixed(2)} kg/día<br>
💧 Agua: ${consumoAgua.toFixed(2)} L/día<br><br>

📊 Total para ${cantidad} animales:<br>
🌿 Materia seca total: ${totalMS.toFixed(2)} kg/día<br>
💧 Agua total: ${totalAgua.toFixed(2)} L/día
`;

}

</script>

</body>
</html>
